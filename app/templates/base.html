<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ settings.app_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}?v=20260621-2">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-mark"></span>
        <span class="brand-text">{{ settings.app_name }}</span>
      </a>
      <nav class="top-actions">
        <a href="/settings">设置</a>
        <a href="/update">在线更新</a>
        <a href="/export/database.sqlite">数据库备份</a>
        <a href="/export/subscriptions.csv">订阅导出</a>
        <a href="/export/prices.csv">价格导出</a>
        <form action="/sync" method="post">
          <button class="primary-button sync-all" title="同步全部订阅" aria-label="同步全部订阅">同步全部</button>
        </form>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
