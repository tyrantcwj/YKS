name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/tyrantcwj/yks

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local smoke-test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: yks:smoke
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        run: |
          set -euo pipefail
          docker run -d --name yks-smoke -p 18000:8000 -e DATABASE_PATH=/data/app.db yks:smoke
          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              docker logs yks-smoke || true
            fi
            docker rm -f yks-smoke || true
            exit "$status"
          }
          trap cleanup EXIT

          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:18000/healthz | grep -q '"ok":true'; then
              curl -fsS http://127.0.0.1:18000/ | grep -qi '<html'
              exit 0
            fi
            sleep 1
          done

          echo "container health check did not pass" >&2
          exit 1

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make container package public
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/user/packages/container/yks" \
            -f visibility='public' || \
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/packages/container/yks" \
            -f visibility='public'
